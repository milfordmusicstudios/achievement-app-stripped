  <title>Sign Up | Music Amplified</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body.white-page.signup-page {
      background:
        radial-gradient(circle at 18% 82%, rgba(73,184,255,0.12), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, #ffffff 46%, #eef7ff 100%);
    }
    main.app.signup-shell {
      width: min(1120px, calc(100vw - 48px));
      max-width: none;
      min-height: 100vh;
      margin: 0 auto;
      padding: 40px 0;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(440px, 500px);
      align-items: center;
      gap: 56px;
    }
    .signup-hero {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      min-height: 520px;
      padding-left: clamp(8px, 3vw, 56px);
    }
    .logo { display:block; max-width: 360px; width: min(100%, 360px); height:auto; }
    .signup-title {
      color:#3399e8;
      margin: 22px 0 0;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: 0;
      max-width: 420px;
    }
    .form-card {
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(11,79,138,0.1);
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 33, 77, 0.12);
      padding: 28px;
    }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block;
      margin: 0 0 7px;
      line-height: 1.35;
    }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 13px 14px;
      font-size: 1rem;
      line-height: 1.25;
      box-sizing: border-box;
      border: 1px solid rgba(11,79,138,0.22);
      border-radius: 10px;
      background: #f8fbff;
      color: #082f52;
    }
    .form-row input:focus, .form-row select:focus {
      outline: 3px solid rgba(73,184,255,0.24);
      border-color: #49b8ff;
      background: #fff;
    }
    .form-row input[type="file"] {
      padding: 10px;
      background: #fff;
    }
    .button-row { display:flex; gap:12px; margin-top: 18px; }
    .blue-button { flex: 1; }
    select[id^="teacherIds"] {
      min-height: 112px;
      max-height: 150px;
      overflow-y: auto;
      background: #fff;
    }
    .helper { font-size: .95rem; color: #00477d; }
    .req { color:#c00; margin-left:4px; }
    .student-block {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(11,79,138,0.12);
    }
    .student-block:first-child {
      margin-top: 8px;
      padding-top: 0;
      border-top: 0;
    }
    .student-block h3 {
      margin: 0 0 16px;
      text-align: left;
      color: #00477d;
      font-size: 1.25rem;
    }
    .remove-student-btn { width: 100%; margin-top: 10px; }
    #addStudentBtn {
      margin-top: 6px !important;
    }
    #signupError {
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff1f1;
    }
    @media (max-width: 860px) {
      main.app.signup-shell {
        width: min(560px, calc(100vw - 28px));
        min-height: auto;
        padding: 24px 0 32px;
        display: block;
      }
      .signup-hero {
        min-height: auto;
        padding: 0;
        align-items: center;
        text-align: center;
        margin-bottom: 18px;
      }
      .logo {
        max-width: 230px;
      }
      .signup-title {
        font-size: 2.1rem;
        line-height: 1.05;
        margin-top: 10px;
      }
      .form-card {
        padding: 20px;
        border-radius: 14px;
      }
    }
  </style>
  <meta name="theme-color" content="#0B4F8A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Music Amplified" />
  <link rel="icon" type="image/png" sizes="192x192" href="images/pwa/icon-192.png?v=20260421a" />
  
  <link rel="apple-touch-icon" href="images/pwa/apple-touch-icon.png?v=20260421a" />
</head>
<body class="white-page signup-page">
  <div id="envBadge" class="env-badge" style="display:none;"></div>

  <main class="app signup-shell">
    <section class="signup-hero" aria-label="Music Amplified">
      <img src="images/logos/amplified.png" alt="Music Amplified" class="logo" />
      <h2 class="signup-title">Create Your Account</h2>
    </section>

    <div class="form-card">
      <form id="signupForm" novalidate>
        <!-- Avatar -->
        <div class="form-row">
          <label for="avatarInput" class="helper">Optional: Upload an avatar</label>
          <input type="file" id="avatarInput" accept="image/*" />
        </div>

        <!-- Parent Email/Password -->
        <div class="form-row">
          <label for="studioSelect" class="helper">Studio<span class="req">*</span></label>
          <select id="studioSelect" name="studioSelect" required>
            <option value="">Loading studios...</option>
          </select>
        </div>

        <div class="form-row">
          <input type="email" id="signupEmail" name="signupEmail" placeholder="Email" required />
        </div>
        <div class="form-row">
          <input type="password" id="signupPassword" name="signupPassword" placeholder="Password" required />
        </div>

        <!-- Students Container -->
        <div id="studentsContainer">

          <!-- Student #1 (IDs stay exactly the same) -->
          <div class="student-block" data-student-index="1">
            <h3>Student #1</h3>

            <!-- Name -->
            <div class="form-row">
              <input type="text" id="firstName" placeholder="First Name" required />
            </div>
            <div class="form-row">
              <input type="text" id="lastName" placeholder="Last Name" required />
            </div>

            <!-- Instrument(s) -->
            <div class="form-row">
              <label for="instrument" class="helper">
                Instrument(s)<span class="req">*</span> - comma separated for multiple (e.g., Piano, Voice)
              </label>
              <input id="instrument" placeholder="Instrument(s)" required />
            </div>

            <!-- Teacher(s) multi-select -->
            <div class="form-row">
              <label for="teacherIds" class="helper">
                Select your teacher(s)<span class="req">*</span>
              </label>
              <select id="teacherIds" multiple></select>
              <small class="helper">Tip: Hold Ctrl/Cmd to select multiple teachers.</small>
            </div>
          </div>
        </div>

        <!-- Add Another Student -->
        <button type="button" id="addStudentBtn" class="blue-button" style="margin-top:12px;">
          Add another student
        </button>

        <!-- Buttons -->
        <div class="button-row">
          <button type="submit" class="blue-button" id="submitBtn">Sign Up</button>
          <button type="button" id="cancelBtn" class="blue-button">Cancel</button>
        </div>

        <p id="signupError" style="color: red; display: none; margin-top:10px;"></p>
        <p class="helper" style="text-align:center; margin-top:8px;">
          Already have an account? <a href="login.html" style="color:#3399e8;">Log in</a>
        </p>
      </form>
    </div>
  </main>

  <!-- Template for additional students -->
  <template id="studentBlockTemplate">
    <div class="student-block" data-student-index="__N__">
      <h3>Student #__N__ (optional)</h3>

      <div class="form-row">
        <label for="firstName__N__" class="helper">First Name</label>
        <input id="firstName__N__" type="text" placeholder="First name">
      </div>

      <div class="form-row">
        <label for="lastName__N__" class="helper">Last Name</label>
        <input id="lastName__N__" type="text" placeholder="Last name">
      </div>

      <div class="form-row">
        <label for="instrument__N__" class="helper">
          Instrument(s)<span class="req">*</span> - comma separated for multiple
        </label>
        <input id="instrument__N__" type="text" placeholder="Piano, Voice">
      </div>

      <div class="form-row">
        <label for="teacherIds__N__" class="helper">
          Select teacher(s)<span class="req">*</span>
        </label>
        <select id="teacherIds__N__" multiple></select>
        <small class="helper">Tip: Hold Ctrl/Cmd to select multiple teachers.</small>
      </div>

      <button type="button" class="blue-button remove-student-btn">
        Remove this student
      </button>
    </div>
  </template>

  <!-- Scripts -->

  <!-- Minimal UI behavior for adding/removing student blocks -->
  <script src="config.js"></script>
  <script src="supabase-config.js"></script>
  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="studio-routing.js"></script>
  <script type="module" src="nav.js"></script>

  <script type="module" src="signup.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const addBtn = document.getElementById("addStudentBtn");
      const container = document.getElementById("studentsContainer");
      const tpl = document.getElementById("studentBlockTemplate");

      if (!addBtn || !container || !tpl) return;

      addBtn.addEventListener("click", () => {
        const nextN = container.querySelectorAll(".student-block").length + 1;

        const html = tpl.innerHTML.replaceAll("__N__", String(nextN));
        const wrapper = document.createElement("div");
        wrapper.innerHTML = html.trim();

        const block = wrapper.firstElementChild;
        container.appendChild(block);

        // Remove handler
        const removeBtn = block.querySelector(".remove-student-btn");
        if (removeBtn) {
          removeBtn.addEventListener("click", () => {
            block.remove();
            // Re-label headers in order (nice-to-have)
            const blocks = container.querySelectorAll(".student-block");
            blocks.forEach((b, i) => {
              const n = i + 1;
              const h = b.querySelector("h3");
              if (h) h.textContent = (n === 1) ? "Student #1" : `Student #${n} (optional)`;
            });
          });
        }
      });
    });
  </script>

  <script type="module" src="pwa-install.js"></script>
</body>
</html>
