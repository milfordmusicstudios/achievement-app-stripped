<body class="app-shell tall-background my-points-page">
  <div class="app-main">
<div id="envBadge" class="env-badge" style="display:none;"></div>

    <main class="app">
    <header class="points-header">
      <div class="points-header-spacer"></div>
      <h1 id="pointsTitle" class="points-title">My Points</h1>
      <img id="levelBadge" src="images/levelBadges/level1.png" alt="Level Badge">
    </header>

    <section id="categorySummary" class="summary-strip"></section>

    <div class="points-toolbar">
      <input id="searchInput" class="white-input" type="search" placeholder="Search logs">
      <select id="statusFilter" class="white-input">
        <option value="all">All statuses</option>
        <option value="approved">Approved</option>
        <option value="pending">Pending</option>
      </select>
      <button id="showAllCategoriesBtn" class="show-all-categories-btn" type="button" hidden>Show all</button>
    </div>

    <div class="logs-table-wrap">
      <table id="logsTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Date</th>
            <th>Points</th>
            <th>Notes</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="logsTableBody"></tbody>
      </table>
    </div>
    </main>

    <div id="badgeCatalogModal" class="badge-catalog-modal" style="display:none;" aria-hidden="true">
      <div class="badge-catalog-panel" role="dialog" aria-modal="true" aria-labelledby="badgeCatalogTitle">
        <div class="badge-catalog-header">
          <h2 id="badgeCatalogTitle">Badges Earned</h2>
          <button id="badgeCatalogCloseBtn" type="button" class="badge-catalog-close" aria-label="Close badges">x</button>
        </div>
        <div id="badgeCatalogBody" class="badge-catalog-body"></div>
      </div>
    </div>

    <div id="needsInfoEditOverlay" class="modal-overlay" style="display:none;" aria-hidden="true">
      <div class="modal student-log-modal my-points-needs-info-modal" role="dialog" aria-modal="true" aria-labelledby="needsInfoEditTitle">
        <div class="modal-header">
          <div id="needsInfoEditTitle" class="modal-title">Update Log Notes</div>
          <button id="needsInfoEditClose" class="modal-close" type="button" aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <div class="modal-field">
            <label>Category</label>
            <input id="needsInfoEditCategory" type="text" disabled>
          </div>
          <div class="modal-field">
            <label>Date</label>
            <input id="needsInfoEditDate" type="text" disabled>
          </div>
          <div class="modal-field">
            <label>Points</label>
            <input id="needsInfoEditPoints" type="text" disabled>
          </div>
          <div class="modal-field">
            <label>Status</label>
            <input id="needsInfoEditStatus" type="text" disabled>
          </div>
          <div class="modal-field">
            <label for="needsInfoEditNotes">Notes</label>
            <textarea id="needsInfoEditNotes" placeholder="Add the missing details..."></textarea>
          </div>
          <div id="needsInfoEditMsg" class="staff-msg" style="display:none;" aria-live="polite"></div>
        </div>
        <div class="modal-actions">
          <button id="needsInfoEditSubmit" class="blue-button" type="button">Submit Update</button>
          <button id="needsInfoEditCancel" class="blue-button" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <div id="app-bottom-nav"></div>
  <script src="config.js"></script>
  <script src="supabase-config.js"></script>
  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="studio-routing.js"></script>
  <script type="module" src="nav.js"></script>

  <script type="module" src="my-points.js"></script>
  <script type="module" src="pwa-install.js"></script>
</body>
</html>
